<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio sesión</title>
  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>

<body>
  <header>
    <div class="logo">
      <img src="img/2.png" alt="Logo Mundial" style="height:50px;">
    </div>
    <div class="inicio">
      <a href="index.html"><i class="bi bi-house-fill"></i></a>
    </div>
  </header>

  <main class="login-container">

    <h1 class="titulo">Inicia sesión</h1>

    <!-- Formulario de Login -->
    <form id="loginForm" class="login-form" method="POST" action="php/login.php">
      <div class="mb-3">
        <label for="user" class="form-label"><i class="bi bi-person"></i> Nombre de usuario</label>
        <input type="text" id="user" name="user_name2" class="form-control" placeholder="Ingresa tu usuario" required>
      </div>
      <div class="mb-3">
        <label for="pass" class="form-label"><i class="bi bi-lock"></i> Contraseña</label>
        <input type="password" id="pass" name="user_pass" class="form-control" placeholder="Ingresa tu contraseña"
          required>
      </div>
      <div class="text-center">
        <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>
      </div>
    </form>

    <div class="text-center mt-3">
      <a href="registro.html" class="link-registro">
        ¿No tienes cuenta? <strong>Regístrate aquí</strong>
      </a>
    </div>
  </main>


  <div class="modal fade" id="loginErrorModal" tabindex="-1" aria-labelledby="loginErrorLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content border-danger">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title" id="loginErrorLabel">Error de inicio de sesión</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          Usuario o contraseña incorrectos. Inténtalo de nuevo.
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
